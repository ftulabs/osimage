name: Build Windows 11 ISO

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'UUP dump build ID (leave empty for latest retail Windows 11)'
        required: false
        type: string

concurrency:
  group: win11-iso-build
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows 11 ISO
    runs-on: windows-latest
    timeout-minutes: 480
    permissions:
      contents: write

    steps:
      - name: Free disk space
        shell: pwsh
        run: |
          $toRemove = @(
            'C:\Android',
            'C:\hostedtoolcache\windows\go',
            'C:\hostedtoolcache\windows\Ruby',
            'C:\hostedtoolcache\windows\node',
            'C:\hostedtoolcache\windows\PyPy',
            'C:\Haskell',
            'C:\ghcup',
            'C:\ProgramData\chocolatey\lib\llvm',
            'C:\ProgramData\chocolatey\lib\mingw',
            'C:\ProgramData\MySQL',
            'C:\ProgramData\PostgreSQL',
            'C:\Program Files\MongoDB',
            'C:\Program Files\LLVM'
          )
          foreach ($p in $toRemove) {
            if (Test-Path $p) {
              Write-Host "Removing: $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C, D -ErrorAction SilentlyContinue |
            Select-Object Name,
              @{N='Free(GB)'; E={[math]::Round($_.Free/1GB, 1)}},
              @{N='Used(GB)'; E={[math]::Round($_.Used/1GB, 1)}}

      - name: Install aria2
        shell: pwsh
        run: |
          choco install aria2 --yes --no-progress
          aria2c --version | Select-Object -First 1

      - name: Resolve build ID
        id: build
        shell: pwsh
        run: |
          $buildId = '${{ inputs.build_id }}'

          if ($buildId) {
            $title    = "Windows 11 ($buildId)"
            $buildNum = $buildId
          } else {
            # fetchupd.php?arch=amd64&ring=retail returns an HTML page listing retail builds.
            # Parse UUIDs and build numbers, then pick the highest build for amd64.
            Write-Host "Fetching latest retail Windows 11 builds..."
            $html = Invoke-WebRequest -Uri "https://uupdump.net/fetchupd.php?arch=amd64&ring=retail" |
              Select-Object -ExpandProperty Content

            $uuids  = [regex]::Matches($html, '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}') |
              ForEach-Object { $_.Value } | Select-Object -Unique
            $builds = [regex]::Matches($html, '\b(2[2-9]\d{3}\.\d+)\b') |
              ForEach-Object { $_.Value } | Select-Object -Unique

            Write-Host "UUIDs  : $($uuids -join ', ')"
            Write-Host "Builds : $($builds -join ', ')"

            if (-not $uuids) {
              Write-Error "No builds found on fetchupd.php. Check the URL or try specifying build_id manually."
              exit 1
            }

            # For each UUID check its build number via the API, pick the highest
            $best = $null
            foreach ($uuid in $uuids) {
              $info = Invoke-RestMethod "https://api.uupdump.net/listlangs.php?id=$uuid"
              $b    = $info.response.updateInfo.build
              $t    = $info.response.updateInfo.title
              Write-Host "  $uuid -> $b  $t"
              if (-not $best -or ([version]($b + '.0') -gt [version]($best.build + '.0'))) {
                $best = [PSCustomObject]@{ uuid=$uuid; build=$b; title=$t }
              }
            }

            $buildId  = $best.uuid
            $buildNum = $best.build
            $title    = $best.title
          }

          Write-Host "Selected: $buildId  ($buildNum)  $title"
          "id=$buildId"         >> $env:GITHUB_OUTPUT
          "title=$title"        >> $env:GITHUB_OUTPUT
          "build_num=$buildNum" >> $env:GITHUB_OUTPUT

      - name: Download UUP dump conversion package
        shell: pwsh
        run: |
          $buildId = '${{ steps.build.outputs.id }}'

          # The form action has id/pack/edition as query-string; conversion options
          # and virtualEditions[] go in the POST body — server pre-fills ConvertConfig.ini.
          $uri  = "https://uupdump.net/get.php?id=${buildId}&pack=en-us&edition=core%3Bprofessional"
          $body = "autodl=2&updates=1&cleanup=1&netfx=1&esd=1" +
                  "&virtualEditions%5B%5D=CoreSingleLanguage" +
                  "&virtualEditions%5B%5D=ProfessionalWorkstation" +
                  "&virtualEditions%5B%5D=ProfessionalEducation" +
                  "&virtualEditions%5B%5D=Education" +
                  "&virtualEditions%5B%5D=Enterprise" +
                  "&virtualEditions%5B%5D=ServerRdsh" +
                  "&virtualEditions%5B%5D=IoTEnterprise" +
                  "&virtualEditions%5B%5D=IoTEnterpriseK"

          # Retry with exponential backoff — UUP dump rate-limits by IP
          $delay = 20
          for ($attempt = 1; $attempt -le 10; $attempt++) {
            Write-Host "Attempt $attempt/10 — downloading package for $buildId ..."
            $resp = Invoke-WebRequest -Uri $uri -Method POST -Body $body `
              -ContentType 'application/x-www-form-urlencoded' `
              -SkipHttpErrorCheck -OutFile uup_package.zip -PassThru

            $size = (Get-Item uup_package.zip).Length
            Write-Host "  HTTP $($resp.StatusCode), $size bytes"

            if ($resp.StatusCode -eq 200 -and $size -gt 5000) {
              Write-Host "Package downloaded OK."
              break
            }

            if ($attempt -eq 10) {
              Write-Host "Response body preview:"
              Get-Content uup_package.zip -Raw | Select-Object -First 1 | ForEach-Object { $_.Substring(0, [math]::Min(300, $_.Length)) }
              Write-Error "Failed to download package after 10 attempts."
              exit 1
            }

            Write-Host "  Rate-limited or error — waiting ${delay}s before retry..."
            Start-Sleep -Seconds $delay
            $delay = [math]::Min($delay * 2, 120)
          }

          $mb = [math]::Round((Get-Item uup_package.zip).Length / 1MB, 1)
          Write-Host "Package: ${mb} MB"

          Expand-Archive uup_package.zip -DestinationPath . -Force

          Write-Host "--- ConvertConfig.ini (server-generated) ---"
          Get-Content ConvertConfig.ini

      - name: Run download and conversion
        shell: cmd
        run: uup_download_windows.cmd

      - name: Locate ISO file
        id: iso
        shell: pwsh
        run: |
          $iso = Get-ChildItem *.iso -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iso) {
            Write-Error "No ISO file produced after conversion!"
            Get-ChildItem
            exit 1
          }
          $gb = [math]::Round($iso.Length / 1GB, 2)
          Write-Host "ISO: $($iso.Name)  ($gb GB)"
          "file=$($iso.Name)" >> $env:GITHUB_OUTPUT

      - name: Split ISO into 2 GB chunks
        id: split
        shell: pwsh
        run: |
          $isoPath   = '${{ steps.iso.outputs.file }}'
          $base      = [IO.Path]::GetFileNameWithoutExtension($isoPath)
          $chunkSize = 2000 * 1024 * 1024   # 2000 MiB
          $buffer    = New-Object byte[] $chunkSize
          $partNum   = 1

          $reader = [IO.File]::OpenRead($isoPath)
          while ($reader.Position -lt $reader.Length) {
            $partFile  = "${base}.part{0:D3}" -f $partNum
            $bytesRead = $reader.Read($buffer, 0, $buffer.Length)
            $writer    = [IO.File]::OpenWrite($partFile)
            $writer.Write($buffer, 0, $bytesRead)
            $writer.Close()
            $mb = [math]::Round((Get-Item $partFile).Length / 1MB)
            Write-Host "Created: $partFile  (${mb} MB)"
            $partNum++
          }
          $reader.Close()
          Remove-Item $isoPath

          $chunks = $partNum - 1
          Write-Host "Split into $chunks chunks"
          "basename=$base"  >> $env:GITHUB_OUTPUT
          "chunks=$chunks"  >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $buildId  = '${{ steps.build.outputs.id }}'
          $title    = '${{ steps.build.outputs.title }}'
          $buildNum = '${{ steps.build.outputs.build_num }}'
          $chunks   = '${{ steps.split.outputs.chunks }}'
          $tag      = "win11-$((Get-Date).ToUniversalTime().ToString('yyyyMMdd-HHmmss'))"

          @"
          ## $title

          | Field | Value |
          |-------|-------|
          | Build ID | ``$buildId`` |
          | Build number | $buildNum |
          | Language | English (United States) |
          | Architecture | amd64 |
          | Parts | $chunks x 2 GB |

          ### Editions included
          - Windows Home
          - Windows Home Single Language
          - Windows Pro
          - Windows Pro for Workstations
          - Windows Pro Education
          - Windows Education
          - Windows Enterprise
          - Windows Enterprise multi-session / Virtual Desktops
          - Windows IoT Enterprise
          - Windows IoT Enterprise Subscription (IoTEnterpriseK)

          ### Conversion options applied
          - Updates integrated
          - Component cleanup
          - .NET Framework 3.5 integrated
          - Solid (ESD) compression

          ### Get the ISO
          Download just **one** of the helper scripts below — it knows this release's
          tag and chunks, downloads them itself, and writes the full ``<basename>.iso``
          next to itself.

          ```powershell
          # PowerShell (Windows / cross-platform)
          iwr -Uri 'https://github.com/${{ github.repository }}/releases/download/$tag/reassemble.ps1' -OutFile reassemble.ps1
          .\reassemble.ps1
          ```
          ```bash
          # Linux / macOS
          curl -LO 'https://github.com/${{ github.repository }}/releases/download/$tag/reassemble.sh'
          bash reassemble.sh
          ```
          "@ | Out-File notes.md -Encoding UTF8

          gh release create $tag `
            --repo $env:GITHUB_REPOSITORY `
            --title $title `
            --notes-file notes.md `
            --latest

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Generate per-release reassembly scripts
        shell: pwsh
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $tag  = '${{ steps.release.outputs.tag }}'
          $base = '${{ steps.split.outputs.basename }}'

          $partFiles = Get-ChildItem "${base}.part*" | Sort-Object Name
          $partSuffixes = $partFiles | ForEach-Object {
            ($_.Name -replace [regex]::Escape("$base."), '')
          }
          $psList = ($partSuffixes | ForEach-Object { "'$_'" }) -join ', '
          $shList = ($partSuffixes -join ' ')

          $psContent = @"
          # Reassemble $base.iso from chunks published in GitHub release $tag.
          # Run anywhere — script auto-downloads missing parts then concatenates them.
          #
          #   pwsh ./reassemble.ps1   (cross-platform)
          #   .\reassemble.ps1        (Windows PowerShell)

          `$ErrorActionPreference = 'Stop'

          `$repo  = '$repo'
          `$tag   = '$tag'
          `$base  = '$base'
          `$parts = @($psList)

          `$here = if (`$PSScriptRoot) { `$PSScriptRoot } else { (Get-Location).Path }
          Set-Location `$here

          foreach (`$p in `$parts) {
              `$file = Join-Path `$here "`$base.`$p"
              if (Test-Path `$file) { Write-Host "[skip] `$base.`$p"; continue }
              `$url = "https://github.com/`$repo/releases/download/`$tag/`$base.`$p"
              Write-Host "[down] `$url"
              Invoke-WebRequest -Uri `$url -OutFile `$file -UseBasicParsing
          }

          `$out    = Join-Path `$here "`$base.iso"
          `$buf    = New-Object byte[] (16 * 1024 * 1024)
          `$writer = [IO.File]::Create(`$out)
          try {
              foreach (`$p in `$parts) {
                  `$file = Join-Path `$here "`$base.`$p"
                  `$reader = [IO.File]::OpenRead(`$file)
                  try {
                      while ((`$n = `$reader.Read(`$buf, 0, `$buf.Length)) -gt 0) {
                          `$writer.Write(`$buf, 0, `$n)
                      }
                  } finally { `$reader.Close() }
              }
          } finally { `$writer.Close() }

          `$gb = [math]::Round((Get-Item `$out).Length / 1GB, 2)
          Write-Host "Done. `$base.iso (`$gb GB)"
          "@

          $shContent = @"
          #!/usr/bin/env bash
          # Reassemble $base.iso from chunks published in GitHub release $tag.
          # Run anywhere — script auto-downloads missing parts then concatenates them.
          #
          #   bash reassemble.sh
          #   ./reassemble.sh

          set -euo pipefail

          REPO='$repo'
          TAG='$tag'
          BASE='$base'
          PARTS=($shList)

          here="`$(cd "`$(dirname "`${BASH_SOURCE[0]}")" && pwd)"
          cd "`$here"

          for p in "`${PARTS[@]}"; do
              file="`$BASE.`$p"
              if [[ -f "`$file" ]]; then
                  echo "[skip] `$file"
                  continue
              fi
              url="https://github.com/`$REPO/releases/download/`$TAG/`$file"
              echo "[down] `$url"
              curl -L --fail --progress-bar -o "`$file" "`$url"
          done

          out="`$BASE.iso"
          : > "`$out"
          for p in "`${PARTS[@]}"; do
              cat "`$BASE.`$p" >> "`$out"
          done

          if size=`$(stat -c%s "`$out" 2>/dev/null); then :; else size=`$(stat -f%z "`$out"); fi
          gb=`$(awk -v b="`$size" 'BEGIN { printf "%.2f", b/1024/1024/1024 }')
          echo "Done. `$out (`${gb} GB)"
          "@

          # Normalize to LF line endings and UTF-8 without BOM
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          $psLF = ($psContent -replace "`r`n", "`n").TrimEnd() + "`n"
          $shLF = ($shContent -replace "`r`n", "`n").TrimEnd() + "`n"

          [IO.File]::WriteAllText((Join-Path $PWD 'reassemble.ps1'), $psLF, $utf8NoBom)
          [IO.File]::WriteAllText((Join-Path $PWD 'reassemble.sh'),  $shLF, $utf8NoBom)

          Write-Host "--- reassemble.ps1 (first 25 lines) ---"
          Get-Content reassemble.ps1 | Select-Object -First 25
          Write-Host "--- reassemble.sh (first 25 lines) ---"
          Get-Content reassemble.sh | Select-Object -First 25

      - name: Upload chunks and helper scripts to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag  = '${{ steps.release.outputs.tag }}'
          $base = '${{ steps.split.outputs.basename }}'

          $files = @(Get-ChildItem "${base}.part*" | Sort-Object Name) +
                   @(Get-Item reassemble.sh) +
                   @(Get-Item reassemble.ps1)

          foreach ($f in $files) {
            $mb = [math]::Round($f.Length / 1MB, 2)
            Write-Host "Uploading $($f.Name)  (${mb} MB) ..."
            gh release upload $tag $f.FullName --repo $env:GITHUB_REPOSITORY --clobber
          }

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
