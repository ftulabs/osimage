name: Build Windows 11 ISO

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'UUP dump build ID (leave empty for latest Windows 11)'
        required: false
        type: string

concurrency:
  group: win11-iso-build
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows 11 ISO
    runs-on: windows-latest
    timeout-minutes: 480
    permissions:
      contents: write

    env:
      LANG_CODE: en-us
      ARCH: amd64
      # Home, Pro, Home SL, Pro for Workstations, Pro Education, Education,
      # Enterprise, Enterprise multi-session, IoT Enterprise, IoT Enterprise Subscription
      EDITIONS: "core;professional;coresinglelanguage;professionalworkstation;professionalEducation;education;enterprise;serverrdsh;iotenterprise;iotenterprises"

    steps:
      - name: Free disk space
        shell: pwsh
        run: |
          $toRemove = @(
            'C:\Android',
            'C:\hostedtoolcache\windows\go',
            'C:\hostedtoolcache\windows\Ruby',
            'C:\hostedtoolcache\windows\node',
            'C:\hostedtoolcache\windows\PyPy',
            'C:\Haskell',
            'C:\ghcup',
            'C:\ProgramData\chocolatey\lib\llvm',
            'C:\ProgramData\chocolatey\lib\mingw',
            'C:\ProgramData\MySQL',
            'C:\ProgramData\PostgreSQL',
            'C:\Program Files\MongoDB',
            'C:\Program Files\LLVM'
          )
          foreach ($p in $toRemove) {
            if (Test-Path $p) {
              Write-Host "Removing: $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C, D -ErrorAction SilentlyContinue |
            Select-Object Name,
              @{N='Free(GB)'; E={[math]::Round($_.Free/1GB, 1)}},
              @{N='Used(GB)'; E={[math]::Round($_.Used/1GB, 1)}}

      - name: Install aria2
        shell: pwsh
        run: |
          choco install aria2 --yes --no-progress
          aria2c --version | Select-Object -First 1

      - name: Resolve build ID
        id: build
        shell: pwsh
        run: |
          $buildId = '${{ inputs.build_id }}'

          if ($buildId) {
            $title    = "Windows 11 ($buildId)"
            $buildNum = $buildId
          } else {
            Write-Host "Searching UUP dump for latest Windows 11 amd64 build..."
            $resp = Invoke-RestMethod `
              "https://api.uupdump.net/listid.php?search=Windows+11&sortByDate=1"

            # builds is a dict keyed by UUID; grab values, filter amd64, take newest
            $update = $resp.response.builds.PSObject.Properties.Value |
              Where-Object { $_.arch -eq 'amd64' } |
              Sort-Object created -Descending |
              Select-Object -First 1

            if (-not $update) {
              Write-Error "No Windows 11 amd64 build found via UUP dump API."
              exit 1
            }

            $buildId  = $update.uuid
            $title    = $update.title
            $buildNum = $update.build
          }

          Write-Host "Build ID  : $buildId"
          Write-Host "Title     : $title"
          Write-Host "Build     : $buildNum"

          "id=$buildId"         >> $env:GITHUB_OUTPUT
          "title=$title"        >> $env:GITHUB_OUTPUT
          "build_num=$buildNum" >> $env:GITHUB_OUTPUT

      - name: Download UUP dump conversion package
        shell: pwsh
        run: |
          $buildId     = '${{ steps.build.outputs.id }}'
          $editionsUrl = '${{ env.EDITIONS }}' -replace ';', '%3B'
          $url = "https://uupdump.net/get.php?id=${buildId}&pack=${{ env.LANG_CODE }}&edition=${editionsUrl}&autodl=2"

          Write-Host "Downloading package for build: $buildId"
          Invoke-WebRequest -Uri $url -OutFile uup_package.zip

          $mb = [math]::Round((Get-Item uup_package.zip).Length / 1MB, 1)
          Write-Host "Package size: ${mb} MB"

          Expand-Archive uup_package.zip -DestinationPath . -Force
          Get-ChildItem

      - name: Configure conversion options
        shell: pwsh
        run: |
          if (-not (Test-Path ConvertConfig.ini)) {
            Write-Host "ConvertConfig.ini not found — skipping"
            Get-ChildItem
          } else {
            $cfg = Get-Content ConvertConfig.ini
            $cfg = $cfg -replace '^AddUpdates=.*', 'AddUpdates=1'
            $cfg = $cfg -replace '^Cleanup=.*',    'Cleanup=1'
            $cfg = $cfg -replace '^NetFx3=.*',     'NetFx3=1'
            $cfg = $cfg -replace '^LCUwinre=.*',   'LCUwinre=1'
            Set-Content ConvertConfig.ini $cfg -Encoding UTF8
            Write-Host "--- ConvertConfig.ini ---"
            Get-Content ConvertConfig.ini
          }

      - name: Run download and conversion
        shell: cmd
        run: uup_download_windows.cmd

      - name: Locate ISO file
        id: iso
        shell: pwsh
        run: |
          $iso = Get-ChildItem *.iso -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iso) {
            Write-Error "No ISO file produced after conversion!"
            Get-ChildItem
            exit 1
          }
          $gb = [math]::Round($iso.Length / 1GB, 2)
          Write-Host "ISO: $($iso.Name)  ($gb GB)"
          "file=$($iso.Name)" >> $env:GITHUB_OUTPUT

      - name: Split ISO into 2 GB chunks
        id: split
        shell: pwsh
        run: |
          $isoPath   = '${{ steps.iso.outputs.file }}'
          $base      = [IO.Path]::GetFileNameWithoutExtension($isoPath)
          $chunkSize = 2000 * 1024 * 1024   # 2000 MiB
          $buffer    = New-Object byte[] $chunkSize
          $partNum   = 1

          $reader = [IO.File]::OpenRead($isoPath)
          while ($reader.Position -lt $reader.Length) {
            $partFile  = "${base}.part{0:D3}" -f $partNum
            $bytesRead = $reader.Read($buffer, 0, $buffer.Length)
            $writer    = [IO.File]::OpenWrite($partFile)
            $writer.Write($buffer, 0, $bytesRead)
            $writer.Close()
            $mb = [math]::Round((Get-Item $partFile).Length / 1MB)
            Write-Host "Created: $partFile  (${mb} MB)"
            $partNum++
          }
          $reader.Close()
          Remove-Item $isoPath

          $chunks = $partNum - 1
          Write-Host "Split into $chunks chunks"
          "basename=$base"  >> $env:GITHUB_OUTPUT
          "chunks=$chunks"  >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $buildId  = '${{ steps.build.outputs.id }}'
          $title    = '${{ steps.build.outputs.title }}'
          $buildNum = '${{ steps.build.outputs.build_num }}'
          $chunks   = '${{ steps.split.outputs.chunks }}'
          $tag      = "win11-$((Get-Date).ToUniversalTime().ToString('yyyyMMdd-HHmmss'))"

          @"
          ## $title

          | Field | Value |
          |-------|-------|
          | Build ID | ``$buildId`` |
          | Build number | $buildNum |
          | Language | English (United States) |
          | Architecture | amd64 |
          | Parts | $chunks x 2 GB |

          ### Editions included
          - Windows Home
          - Windows Home Single Language
          - Windows Pro
          - Windows Pro for Workstations
          - Windows Pro Education
          - Windows Education
          - Windows Enterprise
          - Windows Enterprise multi-session / Virtual Desktops
          - Windows IoT Enterprise
          - Windows IoT Enterprise Subscription

          ### Conversion options applied
          - Updates integrated
          - Component cleanup
          - .NET Framework 3.5 integrated
          - Solid (ESD) compression

          ### Reassemble ISO
          ```powershell
          # PowerShell (Windows)
          `$out = [IO.File]::Create('Windows11.iso')
          Get-ChildItem *.part* | Sort-Object Name | ForEach-Object {
              `$bytes = [IO.File]::ReadAllBytes(`$_.FullName)
              `$out.Write(`$bytes, 0, `$bytes.Length)
          }
          `$out.Close()
          ```
          ```bash
          # Linux / macOS
          cat *.part* > Windows11.iso
          ```
          "@ | Out-File notes.md -Encoding UTF8

          gh release create $tag `
            --repo $env:GITHUB_REPOSITORY `
            --title $title `
            --notes-file notes.md `
            --latest

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload chunks to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag  = '${{ steps.release.outputs.tag }}'
          $base = '${{ steps.split.outputs.basename }}'

          Get-ChildItem "${base}.part*" | Sort-Object Name | ForEach-Object {
            $mb = [math]::Round($_.Length / 1MB)
            Write-Host "Uploading $($_.Name)  (${mb} MB) ..."
            gh release upload $tag $_.FullName --repo $env:GITHUB_REPOSITORY --clobber
          }

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
